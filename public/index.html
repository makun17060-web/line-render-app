<script>
(async () => {
  try {
    alert("① script start");

    const liffId =
      window.LIFF_ID_DEFAULT ||
      window.LIFF_ID_ORDER ||
      window.LIFF_ID ||
      "";

    alert("② liffId=" + liffId);

    if (!liffId) {
      alert("❌ liffId なし");
      return;
    }

    try {
      await liff.init({ liffId });
      alert("③ liff init OK");
    } catch (e) {
      alert("❌ liff.init失敗: " + (e && e.message ? e.message : e));
      console.error("liff.init failed", e);
      return;
    }

    const loggedIn = liff.isLoggedIn();
    alert("④ isLoggedIn=" + loggedIn);

    if (!loggedIn) {
      alert("⑤ loginへ");
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    alert("⑥ userId=" + profile.userId);

    const res = await fetch("/api/liff/opened", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userId: profile.userId,
        source: "index"
      })
    });

    alert("⑦ status=" + res.status);
  } catch (err) {
    alert("❌ 全体error: " + (err && err.message ? err.message : err));
    console.error(err);
  }
})();
</script>
