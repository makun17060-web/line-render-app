<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ご注文内容の確認（初めてセット）</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="/liff-config.js"></script>

  <style>
    :root{
      --bg:#f6f7f9; --card:#fff; --text:#111827; --muted:#6b7280;
      --line:#e5e7eb; --pri:#7a1f1f; --danger:#b91c1c;
      --shadow:0 1px 3px rgba(0,0,0,.06); --radius:14px;
      --barH:110px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:14px 14px calc(var(--barH) + env(safe-area-inset-bottom) + 20px);
    }
    h1{
      margin:0 0 6px;
      font-size:18px;
    }
    .muted{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    .danger{
      color:var(--danger);
      font-weight:900;
      white-space:pre-line;
    }
    .notice{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid #fecaca;
      background:#fff5f5;
      color:#991b1b;
      font-weight:900;
      font-size:13px;
      line-height:1.6;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      margin-top:12px;
      overflow:hidden;
    }

    .hero{
      display:grid;
      grid-template-columns:140px 1fr;
      gap:12px;
      padding:12px;
      border-bottom:1px solid var(--line);
    }
    .imgbox{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      min-height:140px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .imgbox img{
      max-width:100%;
      max-height:140px;
      object-fit:contain;
      display:block;
    }
    .name{
      font-size:18px;
      font-weight:1000;
      line-height:1.35;
    }
    .desc{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      font-weight:900;
      color:var(--pri);
    }

    .body{
      padding:12px;
    }
    .sectionLabel{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      margin-bottom:8px;
    }

    .item{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px 10px;
      padding:12px 0;
      border-top:1px dashed var(--line);
      font-size:14px;
    }
    .item:first-of-type{
      border-top:none;
      padding-top:0;
    }
    .item .itemName{ font-weight:900; }
    .item .itemQty{ color:var(--muted); font-size:13px; }
    .item .itemPrice{
      grid-column:2 / 3;
      grid-row:1 / 3;
      align-self:center;
      white-space:nowrap;
      font-weight:1000;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:6px 0;
      font-size:14px;
    }
    .total{
      margin-top:10px;
      padding-top:10px;
      border-top:2px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:10px;
    }
    .total .label{
      font-weight:900;
      font-size:13px;
      color:var(--muted);
    }
    .total .price{
      font-weight:1000;
      font-size:18px;
      white-space:nowrap;
      color:var(--pri);
    }

    .infoBox{
      margin-top:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fafafa;
      font-size:12px;
      color:#374151;
      line-height:1.7;
    }

    .bar{
      position:fixed;
      left:0; right:0; bottom:0;
      border-top:1px solid var(--line);
      background:rgba(246,247,249,.94);
      backdrop-filter:blur(10px);
      padding:10px 12px;
      padding-bottom:calc(10px + env(safe-area-inset-bottom));
    }
    .bar .inner{
      max-width:860px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .sumBox{
      flex:1 1 auto;
      min-width:180px;
    }
    .sumLabel{
      font-size:11px;
      color:var(--muted);
      letter-spacing:.06em;
    }
    .sumAmount{
      font-size:22px;
      font-weight:1000;
      color:var(--pri);
      line-height:1.1;
    }
    .sumCount{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }
    .btns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      width:100%;
      justify-content:flex-end;
    }
    .btn{
      border:none;
      border-radius:14px;
      padding:12px 14px;
      font-weight:1000;
      cursor:pointer;
      max-width:100%;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      pointer-events:none;
    }
    .btnBack{
      background:#fff;
      border:1px solid var(--line);
      color:#111827;
      flex:1 1 180px;
    }
    .btnNext{
      background:var(--pri);
      color:#fff;
      min-width:240px;
      flex:1 1 260px;
    }

    @media (max-width:640px){
      .hero{
        grid-template-columns:1fr;
      }
      .btnBack,.btnNext{
        flex:1 1 100%;
        min-width:0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ご注文内容の確認（初めてセット）</h1>
    <div class="muted" id="status">読み込み中…</div>

    <div class="notice" id="onceNotice">
      ※ 初めてセットは <b>お一人様1回限り・1点固定</b> の商品です。内容をご確認のうえ、お届け先入力へお進みください。
    </div>

    <div class="card" id="productCard" style="display:none">
      <div class="hero">
        <div class="imgbox" id="imgBox"></div>

        <div>
          <div class="name" id="productName">磯屋初めてセット</div>
          <div class="desc" id="productDesc">まずは味見に。内容はお楽しみのセットです。</div>
          <div class="pill">🧾 申込内容の確認</div>
        </div>
      </div>

      <div class="body">
        <div class="sectionLabel">ご注文商品</div>

        <div class="item">
          <div class="itemName" id="lineName">磯屋初めてセット</div>
          <div class="itemPrice" id="linePrice">0円</div>
          <div class="itemQty">× 1 点</div>
        </div>

        <div class="row"><div>小計</div><div id="subtotal">0円</div></div>

        <div class="total">
          <div class="label">商品合計</div>
          <div class="price" id="totalPrice">0円</div>
        </div>

        <div class="infoBox">
          ・この次の画面でお届け先をご入力いただきます。<br>
          ・送料はその後の確認画面で見積表示されます。<br>
          ・最終確認ページでクレジットまたは代引きを選べます。
        </div>
      </div>
    </div>
  </div>

  <div class="bar">
    <div class="inner">
      <div class="sumBox">
        <div class="sumLabel">商品合計</div>
        <div class="sumAmount" id="barTotal">0円</div>
        <div class="sumCount">（初めてセット 1点）</div>
      </div>

      <div class="btns">
        <button class="btn btnBack" id="backBtn" type="button">写真ページへ戻る</button>
        <button class="btn btnNext" id="nextBtn" type="button">お届け先入力へ進む</button>
      </div>
    </div>
  </div>

<script>
(async function(){
  "use strict";

  const LIFF_ID_ORDER = (window.LIFF_ID_ORDER_TRIAL || "").trim();

  // 必要なら本当の初めてセット商品IDに変更
  const PRODUCT_ID = "fukubako-2026";

  const MODE = "trial";
  const KEY_UID  = "isoya_userId";
  const KEY_CART = "isoya_cart_trial";
  const RETURN_TO = "/confirm.html?mode=trial";
  const INTRO_PAGE_URL = "/trial.html";

  const yen = n => (Number(n)||0).toLocaleString("ja-JP") + "円";

  const statusEl = document.getElementById("status");
  const onceNoticeEl = document.getElementById("onceNotice");
  const productCardEl = document.getElementById("productCard");
  const imgBoxEl = document.getElementById("imgBox");
  const productNameEl = document.getElementById("productName");
  const productDescEl = document.getElementById("productDesc");
  const lineNameEl = document.getElementById("lineName");
  const linePriceEl = document.getElementById("linePrice");
  const subtotalEl = document.getElementById("subtotal");
  const totalPriceEl = document.getElementById("totalPrice");
  const barTotalEl = document.getElementById("barTotal");
  const backBtn = document.getElementById("backBtn");
  const nextBtn = document.getElementById("nextBtn");

  function syncBarHeight(){
    const bar = document.querySelector(".bar");
    if(!bar) return;
    const h = Math.ceil(bar.getBoundingClientRect().height || 0);
    if(h > 0) document.documentElement.style.setProperty("--barH", h + "px");
  }

  function showFatal(title, err){
    statusEl.classList.remove("muted");
    statusEl.classList.add("danger");
    statusEl.textContent = title + (err ? ("\n" + (err?.message || String(err))) : "");
    nextBtn.disabled = true;
  }

  function normalizeImageSrc(image){
    const v = String(image || "").trim();
    if(!v) return "";
    if(v.startsWith("http://") || v.startsWith("https://") || v.startsWith("/")) return v;
    return "/uploads/" + v;
  }

  async function fetchJson(url, options){
    const r = await fetch(url, { cache:"no-store", ...(options||{}) });
    const text = await r.text();
    let d = null;
    try{ d = JSON.parse(text); }catch{ d = null; }
    if(!r.ok){
      const detail = d?.error || d?.message || text || ("HTTP " + r.status);
      throw new Error(detail);
    }
    return d ?? {};
  }

  function isTokenExpiredError(e){
    const msg = (e?.message || String(e||"")).toLowerCase();
    return msg.includes("access token expired") || msg.includes("token expired");
  }

  function reloginHere(){
    try{ if(window.liff && typeof liff.logout === "function") liff.logout(); }catch(e){}
    setTimeout(()=>{
      try{
        liff.login({ redirectUri: location.href });
      }catch(e){
        location.href = location.href;
      }
    }, 300);
  }

  async function ensureLiffUserStable(){
    if(!LIFF_ID_ORDER){
      throw new Error("LIFF_ID_ORDER_TRIAL が空です（/liff-config.js を確認）");
    }

    await liff.init({ liffId: LIFF_ID_ORDER });

    if(!liff.isLoggedIn()){
      statusEl.textContent = "LIFFログイン中…";
      liff.login({ redirectUri: location.href });
      return null;
    }

    try{
      let uid = null;
      try{ uid = liff.getDecodedIDToken()?.sub || null; }catch(e){}
      if(!uid){
        uid = (await liff.getProfile())?.userId || null;
      }
      uid = (uid || "").trim();
      if(uid) localStorage.setItem(KEY_UID, uid);
      if(!uid) throw new Error("userId empty");
      return uid;
    }catch(e){
      if(isTokenExpiredError(e)){
        statusEl.textContent = "セッション更新中…";
        reloginHere();
        return null;
      }
      throw e;
    }
  }

  async function checkAlreadyOrdered(uid){
    try{
      const r = await fetch(
        `/api/fukubako/status?userId=${encodeURIComponent(uid)}&productId=${encodeURIComponent(PRODUCT_ID)}`,
        { cache:"no-store" }
      );
      const d = await r.json().catch(()=>({}));
      if(!r.ok || !d.ok) return { ok:false, allowed:true };
      return d;
    }catch{
      return { ok:false, allowed:true };
    }
  }

  function ensureTrialCartFixed(){
    const cart = { items: [{ id: PRODUCT_ID, qty: 1 }] };
    localStorage.setItem(KEY_CART, JSON.stringify(cart));
    return cart;
  }

  function renderProduct(p){
    productNameEl.textContent = p.name || "磯屋初めてセット";
    productDescEl.textContent = p.desc || "まずは味見に。内容はお楽しみのセットです。";

    const img = normalizeImageSrc(p.image);
    imgBoxEl.innerHTML = "";
    if(img){
      const im = document.createElement("img");
      im.src = img;
      im.alt = p.name || "";
      im.onerror = ()=> im.remove();
      imgBoxEl.appendChild(im);
    }

    const price = Number(p.price || 0);
    lineNameEl.textContent = p.name || "磯屋初めてセット";
    linePriceEl.textContent = yen(price);
    subtotalEl.textContent = yen(price);
    totalPriceEl.textContent = yen(price);
    barTotalEl.textContent = yen(price);

    productCardEl.style.display = "";
  }

  function goAddress(){
    const ret = encodeURIComponent(RETURN_TO);
    const mode = encodeURIComponent(MODE);
    location.href = `/cod-register.html?returnTo=${ret}&mode=${mode}&liff.hback=2`;
  }

  syncBarHeight();
  window.addEventListener("resize", syncBarHeight);

  backBtn.onclick = ()=> location.href = INTRO_PAGE_URL;

  try{
    statusEl.textContent = "確認中…";

    const uid = await ensureLiffUserStable();
    if(!uid) return;

    const st = await checkAlreadyOrdered(uid);
    if(st && st.ok && st.allowed === false){
      onceNoticeEl.innerHTML = "※ <b>ご購入済みのため</b>、今回は初めてセットをご注文いただけません。";
      showFatal("すでに初めてセットをご購入済みです（2回目は購入できません）。");
      return;
    }

    ensureTrialCartFixed();

    const prodRes = await fetchJson("/api/products");
    const products = Array.isArray(prodRes.products) ? prodRes.products : [];
    const product = products.find(p => String(p?.id||"").trim() === PRODUCT_ID) || null;

    if(!product){
      throw new Error(`初めてセット（${PRODUCT_ID}）が products に見つかりません`);
    }

    renderProduct(product);
    statusEl.textContent = "内容をご確認のうえ、お届け先入力へお進みください。";

    nextBtn.onclick = goAddress;
    syncBarHeight();
  }catch(e){
    console.error(e);
    showFatal("読み込みに失敗しました", e);
  }
})();
</script>
</body>
</html>
