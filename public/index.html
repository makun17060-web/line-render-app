<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b3a53" />
  <title>磯屋｜ご注文</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="/liff-config.js"></script>

  <style>
    :root{
      --bg:#f6f7f9;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;

      --pri:#0b3a53;
      --accent:#b45309;

      --warnBg:#fff7ed;
      --warnBd:#fdba74;
      --warnTx:#7c2d12;

      --shadow:0 2px 10px rgba(17,24,39,.08);
      --radius:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:14px 14px 28px;
    }

    header{ padding:8px 2px 10px; }

    .title{ font-size:18px; font-weight:900; margin:0; }
    .sub{ margin:6px 0 0; color:var(--muted); font-size:13px; }

    .slot{ margin:10px 0 14px; }

    .grid{ display:grid; gap:12px; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }

    .badge{
      font-size:12px;
      padding:5px 10px;
      border-radius:999px;
      font-weight:700;
      margin-right:6px;
    }

    .badgePri{ background:rgba(11,58,83,.08); color:var(--pri); }
    .badgeAcc{ background:rgba(180,83,9,.1); color:var(--accent); }

    .h{ margin:8px 0 0; font-size:16px; font-weight:900; }
    .p{ margin:8px 0 0; color:var(--muted); font-size:13px; }

    .btn{
      width:100%;
      margin-top:12px;
      padding:12px;
      border:none;
      border-radius:14px;
      background:var(--pri);
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }

    .promo{
      background:var(--warnBg);
      border:1px solid var(--warnBd);
      color:var(--warnTx);
      padding:10px 14px;
      border-radius:14px;
      font-weight:700;
      cursor:pointer;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1 class="title">手造りえびせんべい 磯屋</h1>
      <p class="sub">ご注文はこちらから</p>
    </header>

    <div id="promoSlot" class="slot"></div>

    <div class="grid">

      <div class="card" id="trialCard">
        <span class="badge badgeAcc">初めての方</span>
        <h2 class="h">初めてセット</h2>
        <p class="p">まずはお試しで</p>
        <button class="btn" onclick="location.href='/fukubako.html'">
          見る
        </button>
      </div>

      <div class="card" id="originalCard">
        <span class="badge badgePri">人気No.1</span>
        <h2 class="h">磯屋オリジナルセット</h2>
        <p class="p">迷ったらこれ（バランス最強）</p>

        <button class="btn" onclick="location.href='/original-set.html'">
          オリジナルセットを見る
        </button>

        <button class="btn" onclick="location.href='/products.html'">
          商品一覧を見る
        </button>
      </div>

    </div>
  </div>

  <script>
    (async () => {
      try {
        const liffId =
          window.LIFF_ID_ORDER ||
          window.LIFF_ID_DEFAULT ||
          window.LIFF_ID ||
          "";

        if (!liffId) {
          console.error("[liff] liffId not found in /liff-config.js");
          return;
        }

        await liff.init({ liffId });
        console.log("[liff] init ok", { liffId });

        if (!liff.isLoggedIn()) {
          console.log("[liff] not logged in -> login");
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        console.log("[liff] profile ok", profile);

        const payload = {
          userId: profile.userId,
          kind: "liff_opened",
          source: "index"
        };

        const res = await fetch("/api/liff/opened", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        console.log("[liff/opened] status=", res.status, "body=", text);
      } catch (err) {
        console.error("[liff/opened] failed:", err);
      }
    })();
  </script>
  <footer class="site-footer">
  <div class="footer-inner">
    <nav class="footer-links" aria-label="フッターナビ">
      <a href="/tokusho.html">特定商取引法に基づく表記</a>
      <a href="/privacy.html">プライバシーポリシー</a>
      <a href="/guide.html">ご利用ガイド</a>
      <a href="/contact.html">お問い合わせ</a>
    </nav>

    <div class="footer-brand">
      <p class="shop-name">合同会社　磯屋コマース</p>
      <p class="shop-copy">手造りえびせんべい 磯屋</p>
    </div>

    <p class="footer-note">
      © 2026 Isoya Commerce Inc. All Rights Reserved.
    </p>
  </div>
</footer>

<style>
  .site-footer{
    margin-top:40px;
    padding:24px 16px 32px;
    background:#f8f8f8;
    border-top:1px solid #e5e5e5;
  }
  .footer-inner{
    max-width:960px;
    margin:0 auto;
    text-align:center;
  }
  .footer-links{
    display:flex;
    flex-wrap:wrap;
    gap:12px 16px;
    justify-content:center;
    margin-bottom:16px;
  }
  .footer-links a{
    color:#333;
    text-decoration:none;
    font-size:14px;
  }
  .footer-links a:hover{
    text-decoration:underline;
  }
  .footer-brand{
    margin-bottom:10px;
    color:#444;
  }
  .shop-name{
    margin:0;
    font-size:14px;
    font-weight:700;
  }
  .shop-copy{
    margin:4px 0 0;
    font-size:13px;
    color:#666;
  }
  .footer-note{
    margin:0;
    font-size:12px;
    color:#888;
  }
</style>
</body>
</html>
